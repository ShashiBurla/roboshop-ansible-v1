- name: mysql playbook
  hosts: all
  become: yes
  tasks:
    - name: install mysql8.4-server
      ansible.builtin.dnf:
        name: mysql8.4-server
        state: present

    - name: enable mysql8.4-server and start
      ansible.builtin.systemd_service:
        name: mysql8.4-server
        state: restarted
        enabled: true

    - name: build project
      ansible.builtin.shell: |
        mysql -u root -e "
          CREATE USER 'root'@'%' IDENTIFIED BY 'RoboShop@1';
          GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
          ALTER USER 'root'@'localhost' IDENTIFIED BY 'RoboShop@1';
          FLUSH PRIVILEGES;
        "
