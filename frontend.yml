- name: frontend playbook
  hosts: all
  become: yes
  tasks:
    - name: install nginx
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: copy nginx config
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf

    - name: Download node
      ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -

    - name: install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Remove app directory
      ansible.builtin.file:
        path: /tmp/frontend
        state: absent

    - name: create app directory
      ansible.builtin.file:
        path: /tmp/frontend
        state: directory
    
    - name: Download and extract frontend.zip
      ansible.builtin.unarchive:
        src:  https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/frontend.zip
        dest: /tmp/frontend.zip
        remote_src: yes

    - name: Download npm
      ansible.builtin.shell: npm install ; npm run build ; rm -rf /usr/share/nginx/html/* ; cp -r out/* /usr/share/nginx/html/

    - name: Restart and enable Nginx service
      ansible.builtin.service:
        name: nginx
        state: restarted
        enabled: true